<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conteúdo Autorizado</title>
  <meta name="description" content="Área restrita – acesso autorizado." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0f1e 0%, #0d1b2a 50%, #0a0f1e 100%);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f1f5f9;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 3rem 4rem;
      text-align: center;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      max-width: 480px;
      width: 90%;
    }
    .shield {
      font-size: 4rem;
      display: block;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 16px rgba(34,211,165,0.6));
      animation: float 3s ease-in-out infinite alternate;
    }
    @keyframes float {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #22d3a5, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }
    p {
      color: #94a3b8;
      font-size: 0.9375rem;
      line-height: 1.7;
    }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      background: rgba(34,211,165,0.15);
      border: 1px solid rgba(34,211,165,0.3);
      color: #22d3a5;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.35rem 0.875rem;
      border-radius: 99px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="shield" aria-hidden="true">✅</span>
    <h1>Conteúdo Autorizado</h1>
    <p>
      Você passou por todas as verificações de segurança.<br/>
      Seja bem-vindo à área restrita do sistema.
    </p>
    <div class="badge">🔐 Acesso Verificado</div>
  </div>

  <!-- Tracker de navegação (opcional) -->
  <script src="/tracker.js" async></script>
</body>
</html>
