<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Painel Administrativo</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080b14;
      --surface:   #0d1220;
      --surface-2: #111827;
      --border:    rgba(255,255,255,0.08);
      --primary:   #6366f1;
      --primary-g: rgba(99,102,241,0.35);
      --success:   #22d3a5;
      --danger:    #f43f5e;
      --text-1:    #f1f5f9;
      --text-2:    #94a3b8;
    }

    html, body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Fundo animado ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .35;
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #6366f1, transparent 70%); top: -160px; left: -160px; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #22d3a5, transparent 70%); bottom: -120px; right: -120px; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #f43f5e22, transparent 70%); top: 40%; left: 50%; animation-delay: -2s; }

    @keyframes orbFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Card de login ── */
    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }

    .login-card {
      background: rgba(13, 18, 32, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(99,102,241,0.08);
      animation: cardIn .5s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo / Header ── */
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      gap: 12px;
    }

    .logo-shield {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 8px 32px rgba(99,102,241,0.4);
      animation: shieldPulse 3s ease-in-out infinite;
    }

    @keyframes shieldPulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(99,102,241,0.4); }
      50%       { box-shadow: 0 8px 48px rgba(99,102,241,0.7); }
    }

    .login-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-1);
      letter-spacing: -.03em;
    }

    .login-sub {
      font-size: 13px;
      color: var(--text-2);
      text-align: center;
    }

    /* ── Formulário ── */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
      opacity: .6;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 44px 13px 42px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--text-1);
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }

    input:focus {
      border-color: rgba(99,102,241,0.6);
      background: rgba(99,102,241,0.04);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    input::placeholder { color: var(--text-2); opacity: .5; }

    .toggle-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      opacity: .5;
      transition: opacity .2s;
      user-select: none;
    }
    .toggle-eye:hover { opacity: 1; }

    /* ── Botão ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: .02em;
      margin-top: 8px;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover:not(:disabled) {
      opacity: .92;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(99,102,241,0.5);
    }

    .btn-login:active:not(:disabled) { transform: scale(.98); }

    .btn-login:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* Spinner do botão */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Erro / Sucesso ── */
    .alert {
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
      animation: alertIn .3s ease both;
    }
    .alert.show { display: flex; }
    .alert-error   { background: rgba(244,63,94,.12); border: 1px solid rgba(244,63,94,.3); color: #f87171; }
    .alert-success { background: rgba(34,211,165,.12); border: 1px solid rgba(34,211,165,.3); color: #34d399; }

    @keyframes alertIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer do card ── */
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--text-2);
      opacity: .5;
    }

    /* ── Partículas decorativas ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(99,102,241,0.6);
      animation: particleDrift linear infinite;
    }

    @keyframes particleDrift {
      from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      to   { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>
  <div class="particles" id="particles" aria-hidden="true"></div>

  <!-- Card -->
  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <div class="logo-shield">🛡️</div>
        <div>
          <div class="login-title">Painel de Proteção</div>
          <div class="login-sub">Acesso restrito a administradores</div>
        </div>
      </div>

      <div class="alert alert-error" id="alert-error" role="alert">
        <span>🔐</span>
        <span id="alert-error-msg">Senha incorreta. Tente novamente.</span>
      </div>

      <div class="alert alert-success" id="alert-success" role="alert">
        <span>✅</span>
        <span>Autenticado! Redirecionando…</span>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="password">Senha de acesso</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              autofocus
              required
            />
            <span class="toggle-eye" id="toggle-eye" title="Mostrar/ocultar senha">👁️</span>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-submit">
          <div class="spinner"></div>
          <span class="btn-text">Entrar no Painel</span>
        </button>
      </form>

      <div class="login-footer">
        🔒 Conexão segura · Sistema de Proteção Web
      </div>

    </div>
  </div>

  <script>
    'use strict';

    // ── Partículas ──────────────────────────────────────────────
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left     = Math.random() * 100 + 'vw';
      p.style.width    = (Math.random() * 3 + 1) + 'px';
      p.style.height   = p.style.width;
      p.style.animationDuration  = (Math.random() * 12 + 10) + 's';
      p.style.animationDelay     = -(Math.random() * 20) + 's';
      p.style.opacity  = Math.random() * 0.6 + 0.2;
      container.appendChild(p);
    }

    // ── Toggle de visibilidade da senha ──────────────────────────
    const passEl  = document.getElementById('password');
    const eyeEl   = document.getElementById('toggle-eye');
    eyeEl.addEventListener('click', () => {
      const isPass = passEl.type === 'password';
      passEl.type  = isPass ? 'text' : 'password';
      eyeEl.textContent = isPass ? '🙈' : '👁️';
    });

    // ── Submissão do formulário ───────────────────────────────────
    const form    = document.getElementById('login-form');
    const btnEl   = document.getElementById('btn-submit');
    const errEl   = document.getElementById('alert-error');
    const errMsg  = document.getElementById('alert-error-msg');
    const succEl  = document.getElementById('alert-success');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const senha = passEl.value.trim();
      if (!senha) return;

      errEl.classList.remove('show');
      btnEl.classList.add('loading');
      btnEl.disabled = true;

      try {
        const r = await fetch('/admin/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: senha }),
        });

        if (r.ok) {
          sessionStorage.setItem('adminPass', senha);
          succEl.classList.add('show');
          setTimeout(() => { window.location.href = '/admin'; }, 800);
        } else {
          const data = await r.json().catch(() => ({}));
          errMsg.textContent = data.error || 'Senha incorreta. Tente novamente.';
          errEl.classList.add('show');
          passEl.value = '';
          passEl.focus();
          // Shake no card
          const card = document.querySelector('.login-card');
          card.style.animation = 'none';
          card.offsetHeight;
          card.style.animation = 'shake .4s ease';
        }
      } catch (err) {
        errMsg.textContent = 'Erro de conexão. Verifique o servidor.';
        errEl.classList.add('show');
      } finally {
        btnEl.classList.remove('loading');
        btnEl.disabled = false;
      }
    });

    // Animação de shake para senha errada
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%,100% { transform: translateX(0); }
        20%      { transform: translateX(-8px); }
        40%      { transform: translateX(8px); }
        60%      { transform: translateX(-5px); }
        80%      { transform: translateX(5px); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
